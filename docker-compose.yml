services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: pdf-remediation-hermes
    restart: unless-stopped
    command: gateway run
    env_file:
      - .env
    environment:
      HERMES_DASHBOARD: "${HERMES_DASHBOARD:-1}"
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      HERMES_DASHBOARD_PORT: "9119"
      HERMES_DASHBOARD_INSECURE: "1"

      API_SERVER_ENABLED: "${API_SERVER_ENABLED:-true}"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_PORT: "8642"
      API_SERVER_KEY: "${API_SERVER_KEY}"
      API_SERVER_MODEL_NAME: "${API_SERVER_MODEL_NAME:-Hermes Agent}"

      GATEWAY_ALLOW_ALL_USERS: "true"

      NVIDIA_API_KEY: "${NVIDIA_API_KEY}"
      NVIDIA_BASE_URL: "${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}"
      PRIMARY_MODEL: "${PRIMARY_MODEL:-stepfun-ai/step-3.7-flash}"
      VISION_MODEL: "${VISION_MODEL:-meta/llama-4-maverick-17b-128e-instruct}"
    ports:
      - "${HERMES_API_BIND:-127.0.0.1}:${HERMES_API_PORT:-8642}:8642"
      - "${HERMES_DASHBOARD_BIND:-127.0.0.1}:${HERMES_DASHBOARD_PORT:-9119}:9119"
    volumes:
      - ./hermes/data:/opt/data
      - ./app:/app
      - ./workspace:/app/workspace
    working_dir: /app
    shm_size: "1gb"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: pdf-remediation-open-webui
    restart: unless-stopped
    depends_on:
      - hermes
    environment:
      OPENAI_API_BASE_URL: "http://hermes:8642/v1"
      OPENAI_API_KEY: "${API_SERVER_KEY}"
      WEBUI_AUTH: "${OPEN_WEBUI_AUTH:-false}"
      ENABLE_TITLE_GENERATION: "false"
      ENABLE_FOLLOW_UP_GENERATION: "false"
      ENABLE_TAGS_GENERATION: "false"
    ports:
      - "${OPEN_WEBUI_BIND:-127.0.0.1}:${OPEN_WEBUI_PORT:-8080}:8080"
    volumes:
      - ./hermes/open-webui:/app/backend/data
