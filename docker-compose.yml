services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    image: me-pdf-hermes:local
    container_name: pdf-remediation-hermes
    restart: unless-stopped
    command: gateway run
    env_file:
      - .env
    environment:
      HERMES_DASHBOARD_HOST: "0.0.0.0"
      API_SERVER_HOST: "0.0.0.0"
      GATEWAY_ALLOW_ALL_USERS: "true"
      # Seed bundled skills from the git-tracked repo dir (mounted via ./app:/app)
      # instead of the default /opt/data/skills. Makes the pdf-remediation
      # job runbook version-controlled and deployable via git + restart.
      HERMES_BUNDLED_SKILLS: "/app/hermes_skills"
    ports:
      - "${HERMES_API_BIND:-127.0.0.1}:${HERMES_API_PORT:-8642}:8642"
      - "${HERMES_DASHBOARD_BIND:-127.0.0.1}:${HERMES_DASHBOARD_PORT:-9119}:9119"
    volumes:
      - ./hermes/data:/opt/data
      - ./app:/app
      - ./workspace:/app/workspace
    working_dir: /app
    shm_size: "1gb"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: pdf-remediation-open-webui
    restart: unless-stopped
    depends_on:
      - hermes
    env_file:
      - .env
    environment:
      OPENAI_API_BASE_URL: "http://hermes:8642/v1"
      WEBUI_AUTH: "false"
      ENABLE_TITLE_GENERATION: "false"
      ENABLE_FOLLOW_UP_GENERATION: "false"
      ENABLE_TAGS_GENERATION: "false"
    ports:
      - "${OPEN_WEBUI_BIND:-127.0.0.1}:${OPEN_WEBUI_PORT:-8080}:8080"
    volumes:
      - ./hermes/open-webui:/app/backend/data
